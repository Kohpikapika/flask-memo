<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Flask Memo</title>
</head>
<body>
    <h1>Flask Memo</h1>

    <form method="POST">
        <input type="text" name="memo" placeholder="メモを入力">
        <button type="submit">追加</button>
    </form>

    {% if memo %}
        <p>入力されたメモ：{{ memo }}</p>
    {% endif %}
</body>
</html>
